import json
import os
import re
import urllib.request

USERNAME = os.environ["GITHUB_USERNAME"]
TOKEN = os.environ["GITHUB_TOKEN"]

QUERY = """
query($login: String!) {
  user(login: $login) {
    pinnedItems(first: 6, types: REPOSITORY) {
      nodes {
        ... on Repository {
          name
          description
          url
          homepageUrl
          stargazerCount
          primaryLanguage {
            name
          }
        }
      }
    }
  }
}
"""

req = urllib.request.Request(
    "https://api.github.com/graphql",
    data=json.dumps({
        "query": QUERY,
        "variables": {"login": USERNAME}
    }).encode("utf-8"),
    headers={
        "Authorization": f"Bearer {TOKEN}",
        "Content-Type": "application/json",
        "User-Agent": USERNAME,
    },
)

with urllib.request.urlopen(req) as resp:
    payload = json.loads(resp.read().decode("utf-8"))

repos = payload["data"]["user"]["pinnedItems"]["nodes"]

if repos:
    blocks = []
    for repo in repos:
        name = repo["name"]
        desc = repo["description"] or "No description provided."
        url = repo["url"]
        lang = repo["primaryLanguage"]["name"] if repo["primaryLanguage"] else "N/A"
        stars = repo["stargazerCount"]
        live = repo["homepageUrl"]

        live_text = f' · [Live]({live})' if live else ""

        blocks.append(
f"""<a href="{url}">
  <img src="https://github-readme-stats.vercel.app/api/pin/?username={USERNAME}&repo={name}&hide_border=true&theme=tokyonight" />
</a>

**[{name}]({url})** — {desc} · ⭐ {stars} · {lang}{live_text}
"""
        )
    replacement = "\n\n".join(blocks)
else:
    replacement = "_No pinned repositories found yet. Pin repositories on your GitHub profile to populate this section automatically._"

with open("README.md", "r", encoding="utf-8") as f:
    readme = f.read()

pattern = r"(<!-- featured-projects:start -->)(.*?)(<!-- featured-projects:end -->)"
updated = re.sub(
    pattern,
    r"\1\n" + replacement + r"\n\3",
    readme,
    flags=re.DOTALL
)

with open("README.md", "w", encoding="utf-8") as f:
    f.write(updated)
